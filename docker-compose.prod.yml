services:
  app:
    build:
      context: .
      dockerfile: docker/prod.Dockerfile
      target: production
    container_name: inventory_app_prod
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - BUN_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - inventory_network
    restart: unless-stopped
    # Configuraciones de producción
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  redis:
    image: redis:7-alpine
    container_name: inventory_redis_prod
    ports:
      - '6379:6379'
    volumes:
      - redis_prod_data:/data
    networks:
      - inventory_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Configuraciones de producción para Redis
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

volumes:
  redis_prod_data:

networks:
  inventory_network:
    driver: bridge
