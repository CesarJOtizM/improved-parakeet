services:
  - type: web
    name: nevada-api
    runtime: docker
    dockerfilePath: docker/prod.Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BUN_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SWAGGER_ENABLED
        value: "false"
      - key: LOG_LEVEL
        value: warn
      - key: LOG_FORMAT
        value: json
      # Secrets — configure in Render dashboard
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
